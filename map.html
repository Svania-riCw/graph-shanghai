<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地图</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #amap-container { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="amap-container"></div>
    
    <script src="https://webapi.amap.com/maps?v=2.0&key=6fc614d0454e138a426ed6735b5989c8&plugin=AMap.Buildings,AMap.Scale,AMap.ToolBar,AMap.Circle,AMap.GeometryUtil"></script>

    <script>
        // 检查高德地图 API 是否加载
        if (typeof AMap === 'undefined') {
            document.body.innerHTML = '<div style="color:white; text-align:center; padding-top:50px;">高德地图 API 加载失败，请检查网络连接</div>';
            throw new Error('AMap not loaded');
        }
        
        console.log('高德地图 API 加载成功');
        
        let map;
        let areaCircles = [];

        // 初始化地图
        function init() {
            console.log('开始初始化地图...');
            map = new AMap.Map('amap-container', {
                viewMode: '3D',
                pitch: 60,
                zoom: 14,
                center: [121.4737, 31.2304],
                mapStyle: 'amap://styles/darkblue',
                showBuildingBlock: true,
                dragEnable: true,
                zoomEnable: true,
                rotateEnable: true,
                pitchEnable: true
            });
            
            // 添加3D建筑
            const buildings = new AMap.Buildings({
                zooms: [14, 20],
                zIndex: 10,
                heightFactor: 1.5
            });
            map.add(buildings);
            
            // 添加区域圆形
            try {
                addAreaCircles();
            } catch (e) {
                console.error('添加区域圆形失败:', e);
            }

            // 添加控件
            try {
                map.addControl(new AMap.Scale());
                map.addControl(new AMap.ToolBar({ position: 'RB' }));
            } catch (e) {
                console.error('添加控件失败:', e);
            }

            console.log('地图初始化完成');
        }
        
        // 存储区域数据用于点击检测
        const areasData = [];
        const areaObjects = {}; // 存储区域对象，用于显示/隐藏

        // 添加区域圆形
        function addAreaCircles() {
            console.log('addAreaCircles 函数被调用');
            
            if (!map) {
                console.error('地图未初始化');
                return;
            }
            
            const areas = [
                { name: '南京路商圈', center: [121.4737, 31.2348], radius: 800, color: '#ff6b6b' },
                { name: '淮海路商圈', center: [121.4636, 31.2183], radius: 1000, color: '#4ecdc4' },
                { name: '外滩历史文化区', center: [121.4906, 31.2397], radius: 1200, color: '#ffd93d' },
                { name: '豫园老城厢', center: [121.4922, 31.2272], radius: 600, color: '#95e1d3' },
                { name: '新天地石库门区', center: [121.4734, 31.2214], radius: 500, color: '#f38181' },
                { name: '田子坊创意区', center: [121.4668, 31.2103], radius: 400, color: '#aa96da' },
                { name: '武康路名人故居区', center: [121.4546, 31.2045], radius: 700, color: '#fcbad3' },
                { name: '思南路梧桐区', center: [121.4689, 31.2156], radius: 600, color: '#a8d8ea' },
                { name: '陕西南路商圈', center: [121.4580, 31.2150], radius: 500, color: '#ff9f43' },
                { name: '重庆北路商务区', center: [121.4700, 31.2350], radius: 450, color: '#10ac84' },
                { name: '静安寺商圈', center: [121.4460, 31.2230], radius: 800, color: '#ee5a6f' },
                { name: '陆家嘴金融区', center: [121.5018, 31.2304], radius: 1500, color: '#00d4ff' }
            ];

            areas.forEach((area, index) => {
                // 保存区域数据
                areasData.push(area);

                // 创建圆形 - 增强可见性，设置高zIndex，增大半径
                const circle = new AMap.Circle({
                    center: area.center,
                    radius: area.radius * 1.5,
                    fillColor: area.color,
                    fillOpacity: 0.7,
                    strokeColor: '#ffffff',
                    strokeWeight: 6,
                    strokeOpacity: 1.0,
                    strokeStyle: 'solid',
                    cursor: 'pointer',
                    extData: { name: area.name },
                    zIndex: 1000
                });

                // 点击事件
                circle.on('click', (e) => {
                    console.log('圆形被点击:', area.name);
                    window.parent.postMessage({ type: 'areaClick', name: area.name }, '*');
                });

                // 不添加到地图，默认隐藏
                areaCircles.push(circle);

                // 保存区域对象
                areaObjects[area.name] = { circle, marker: null, visible: false };

                // 创建标记 - 设置高zIndex
                const marker = new AMap.Marker({
                    position: area.center,
                    title: area.name,
                    cursor: 'pointer',
                    zIndex: 101,
                    label: {
                        content: `<div style="background: ${area.color}; color: white; padding: 5px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; border: 2px solid white;">${area.name}</div>`,
                        offset: new AMap.Pixel(0, -35)
                    }
                });

                marker.on('click', () => {
                    console.log('标记被点击:', area.name);
                    window.parent.postMessage({ type: 'areaClick', name: area.name }, '*');
                });

                // 不添加到地图，默认隐藏
                areaObjects[area.name].marker = marker;
            });
            
            console.log('所有区域创建完成，共', areas.length, '个');
            console.log('areaCircles 数组长度:', areaCircles.length);
            console.log('areaObjects 键:', Object.keys(areaObjects));

            // 添加地图点击事件 - 检测点击位置
            map.on('click', (e) => {
                console.log('地图被点击:', e.lnglat);
                const clickLngLat = e.lnglat;
                const clickPos = [clickLngLat.lng, clickLngLat.lat];
                let clickedArea = null;
                let minDistance = Infinity;

                // 检查点击位置是否在某个区域内（使用简单的距离计算）
                areasData.forEach(area => {
                    const distance = calculateDistance(clickPos, area.center);
                    if (distance <= area.radius * 1.5 && distance < minDistance) {
                        minDistance = distance;
                        clickedArea = area;
                    }
                });

                // 如果点击在某个区域内，发送消息
                if (clickedArea) {
                    console.log('点击在区域内:', clickedArea.name);
                    window.parent.postMessage({ type: 'areaClick', name: clickedArea.name }, '*');
                } else {
                    console.log('点击不在任何区域内');
                }
            });

            // 确保圆形可点击 - 使用覆盖物点击事件
            map.on('overlayclick', (e) => {
                console.log('覆盖物被点击:', e);
            });
        }

        // 计算两点间距离（米）
        function calculateDistance(p1, p2) {
            const R = 6371000; // 地球半径（米）
            const lat1 = p1[1] * Math.PI / 180;
            const lat2 = p2[1] * Math.PI / 180;
            const deltaLat = (p2[1] - p1[1]) * Math.PI / 180;
            const deltaLng = (p2[0] - p1[0]) * Math.PI / 180;

            const a = Math.sin(deltaLat/2) * Math.sin(deltaLat/2) +
                      Math.cos(lat1) * Math.cos(lat2) *
                      Math.sin(deltaLng/2) * Math.sin(deltaLng/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

            return R * c;
        }
        
        // 监听父页面消息
        let rotationInterval = null;
        window.addEventListener('message', (e) => {
            console.log('地图收到消息:', e.data);
            if (e.data === 'reset') {
                console.log('执行重置视角');
                map.setZoomAndCenter(14, [121.4737, 31.2304]);
                map.setPitch(60);
            } else if (e.data === 'night') {
                console.log('切换到夜景模式');
                map.setMapStyle('amap://styles/darkblue');
            } else if (e.data === 'day') {
                console.log('切换到日间模式');
                map.setMapStyle('amap://styles/normal');
            } else if (e.data === 'startRotate') {
                console.log('开始自动旋转');
                if (rotationInterval) clearInterval(rotationInterval);
                let rotation = map.getRotation() || 0;
                rotationInterval = setInterval(() => {
                    rotation += 0.5;
                    map.setRotation(rotation);
                }, 50);
            } else if (e.data === 'stopRotate') {
                console.log('停止自动旋转');
                if (rotationInterval) {
                    clearInterval(rotationInterval);
                    rotationInterval = null;
                }
            } else if (e.data === 'zoomIn') {
                console.log('放大');
                const currentZoom = map.getZoom();
                map.setZoom(currentZoom + 1);
            } else if (e.data === 'zoomOut') {
                console.log('缩小');
                const currentZoom = map.getZoom();
                map.setZoom(currentZoom - 1);
            } else if (e.data === 'pitchUp') {
                console.log('俯视按钮 - 实际减小pitch（更平）');
                const currentPitch = map.getPitch();
                map.setPitch(Math.max(currentPitch - 10, 0));
            } else if (e.data === 'pitchDown') {
                console.log('平视按钮 - 实际增加pitch（更俯视）');
                const currentPitch = map.getPitch();
                map.setPitch(Math.min(currentPitch + 10, 80));
            } else if (e.data && e.data.type === 'toggleArea') {
                // 显示/隐藏切换指定区域
                const areaName = e.data.name;
                console.log('收到 toggleArea 消息:', areaName);
                console.log('areaObjects:', Object.keys(areaObjects));
                if (areaObjects[areaName]) {
                    console.log('找到区域对象:', areaName);
                    const obj = areaObjects[areaName];
                    console.log('当前可见状态:', obj.visible);
                    if (obj.visible) {
                        // 如果已显示，则隐藏
                        map.remove(obj.circle);
                        map.remove(obj.marker);
                        obj.visible = false;
                        console.log('隐藏区域:', areaName);
                    } else {
                        // 如果未显示，则显示
                        map.add(obj.circle);
                        map.add(obj.marker);
                        obj.visible = true;
                        console.log('显示区域:', areaName);
                        // 移动到该区域
                        const center = obj.circle.getCenter();
                        map.setZoomAndCenter(15, center);
                    }
                } else {
                    console.error('未找到区域:', areaName);
                }
            }
        });
        
        // 初始化
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
