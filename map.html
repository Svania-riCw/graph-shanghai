<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地图</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        #amap-container { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="amap-container"></div>
    
    <script src="https://webapi.amap.com/maps?v=2.0&key=6fc614d0454e138a426ed6735b5989c8&plugin=AMap.Buildings,AMap.Scale,AMap.ToolBar,AMap.Circle,AMap.GeometryUtil"></script>
    
    <script>
        let map;
        let areaCircles = [];
        
        // 初始化地图
        function init() {
            map = new AMap.Map('amap-container', {
                viewMode: '3D',
                pitch: 60,
                zoom: 14,
                center: [121.4737, 31.2304],
                mapStyle: 'amap://styles/darkblue',
                showBuildingBlock: true
            });
            
            // 添加3D建筑
            const buildings = new AMap.Buildings({
                zooms: [14, 20],
                zIndex: 10,
                heightFactor: 1.5
            });
            map.add(buildings);
            
            // 添加区域圆形
            addAreaCircles();
            
            // 添加控件
            map.addControl(new AMap.Scale());
            map.addControl(new AMap.ToolBar({ position: 'RB' }));
            
            console.log('地图初始化完成');
        }
        
        // 存储区域数据用于点击检测
        const areasData = [];

        // 添加区域圆形
        function addAreaCircles() {
            const areas = [
                { name: '南京路商圈', center: [121.4737, 31.2348], radius: 800, color: '#ff6b6b' },
                { name: '淮海路商圈', center: [121.4636, 31.2183], radius: 1000, color: '#4ecdc4' },
                { name: '外滩历史文化区', center: [121.4906, 31.2397], radius: 1200, color: '#ffd93d' },
                { name: '豫园老城厢', center: [121.4922, 31.2272], radius: 600, color: '#95e1d3' },
                { name: '新天地石库门区', center: [121.4734, 31.2214], radius: 500, color: '#f38181' },
                { name: '田子坊创意区', center: [121.4668, 31.2103], radius: 400, color: '#aa96da' },
                { name: '武康路名人故居区', center: [121.4546, 31.2045], radius: 700, color: '#fcbad3' },
                { name: '思南路梧桐区', center: [121.4689, 31.2156], radius: 600, color: '#a8d8ea' },
                { name: '陕西南路商圈', center: [121.4580, 31.2150], radius: 500, color: '#ff9f43' },
                { name: '重庆北路商务区', center: [121.4700, 31.2350], radius: 450, color: '#10ac84' },
                { name: '静安寺商圈', center: [121.4460, 31.2230], radius: 800, color: '#ee5a6f' },
                { name: '陆家嘴金融区', center: [121.5018, 31.2304], radius: 1500, color: '#00d4ff' }
            ];

            areas.forEach(area => {
                // 保存区域数据
                areasData.push(area);

                const circle = new AMap.Circle({
                    center: area.center,
                    radius: area.radius,
                    fillColor: area.color,
                    fillOpacity: 0.3,
                    strokeColor: area.color,
                    strokeWeight: 3,
                    strokeOpacity: 0.9,
                    cursor: 'pointer'
                });

                // 点击事件 - 通知父页面
                circle.on('click', (e) => {
                    console.log('圆形被点击:', area.name);
                    e.stopPropagation();
                    window.parent.postMessage({ type: 'areaClick', name: area.name }, '*');
                });

                map.add(circle);
                areaCircles.push(circle);

                // 中心标记
                const marker = new AMap.Marker({
                    position: area.center,
                    title: area.name,
                    cursor: 'pointer',
                    label: {
                        content: `<div style="background: ${area.color}; color: white; padding: 5px 10px; border-radius: 4px; font-size: 12px; font-weight: bold; cursor: pointer;">${area.name}</div>`,
                        offset: new AMap.Pixel(0, -35)
                    }
                });

                marker.on('click', (e) => {
                    console.log('标记被点击:', area.name);
                    e.stopPropagation();
                    window.parent.postMessage({ type: 'areaClick', name: area.name }, '*');
                });

                map.add(marker);
            });

            // 添加地图点击事件 - 检测点击位置
            map.on('click', (e) => {
                console.log('地图被点击:', e.lnglat);
                const clickLngLat = e.lnglat;
                const clickPos = [clickLngLat.lng, clickLngLat.lat];
                let clickedArea = null;
                let minDistance = Infinity;

                // 检查点击位置是否在某个区域内（使用简单的距离计算）
                areasData.forEach(area => {
                    const distance = calculateDistance(clickPos, area.center);
                    if (distance <= area.radius && distance < minDistance) {
                        minDistance = distance;
                        clickedArea = area;
                    }
                });

                // 如果点击在某个区域内，发送消息
                if (clickedArea) {
                    console.log('点击在区域内:', clickedArea.name);
                    window.parent.postMessage({ type: 'areaClick', name: clickedArea.name }, '*');
                } else {
                    console.log('点击不在任何区域内');
                }
            });
        }

        // 计算两点间距离（米）
        function calculateDistance(p1, p2) {
            const R = 6371000; // 地球半径（米）
            const lat1 = p1[1] * Math.PI / 180;
            const lat2 = p2[1] * Math.PI / 180;
            const deltaLat = (p2[1] - p1[1]) * Math.PI / 180;
            const deltaLng = (p2[0] - p1[0]) * Math.PI / 180;

            const a = Math.sin(deltaLat/2) * Math.sin(deltaLat/2) +
                      Math.cos(lat1) * Math.cos(lat2) *
                      Math.sin(deltaLng/2) * Math.sin(deltaLng/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

            return R * c;
        }
        
        // 监听父页面消息
        let rotationInterval = null;
        window.addEventListener('message', (e) => {
            console.log('地图收到消息:', e.data);
            if (e.data === 'reset') {
                console.log('执行重置视角');
                map.setZoomAndCenter(14, [121.4737, 31.2304]);
                map.setPitch(60);
            } else if (e.data === 'night') {
                console.log('切换到夜景模式');
                map.setMapStyle('amap://styles/darkblue');
            } else if (e.data === 'day') {
                console.log('切换到日间模式');
                map.setMapStyle('amap://styles/normal');
            } else if (e.data === 'startRotate') {
                console.log('开始自动旋转');
                if (rotationInterval) clearInterval(rotationInterval);
                let rotation = map.getRotation() || 0;
                rotationInterval = setInterval(() => {
                    rotation += 0.5;
                    map.setRotation(rotation);
                }, 50);
            } else if (e.data === 'stopRotate') {
                console.log('停止自动旋转');
                if (rotationInterval) {
                    clearInterval(rotationInterval);
                    rotationInterval = null;
                }
            } else if (e.data === 'zoomIn') {
                console.log('放大');
                map.zoomIn();
            } else if (e.data === 'zoomOut') {
                console.log('缩小');
                map.zoomOut();
            }
        });
        
        // 初始化
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
