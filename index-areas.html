<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上海3D街道地图 - 区域划分版</title>
    <style>
        /* 高德地图容器样式 */
        #amap-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 覆盖层 - 确保在最上层 */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            pointer-events: none;
        }

        #overlay > * {
            pointer-events: auto;
        }
        
        /* 侧边栏样式 - 确保可点击 */
        .sidebar {
            position: fixed;
            top: 100px;
            left: 20px;
            width: 220px;
            max-height: calc(100vh - 140px);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 15px;
            z-index: 10000;
            overflow-y: auto;
            border: 1px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            pointer-events: auto !important;
        }

        .sidebar h3 {
            color: #1a1a2e;
            font-size: 14px;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 2px solid #00d4ff;
        }

        .sidebar ul {
            list-style: none;
            margin-bottom: 20px;
        }

        .sidebar li {
            color: #333;
            padding: 10px 12px;
            margin-bottom: 6px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
            border-left: 4px solid transparent;
            background: rgba(0, 0, 0, 0.03);
        }

        .sidebar li:hover {
            background: rgba(0, 212, 255, 0.1);
            transform: translateX(5px);
            border-left-color: #00d4ff;
        }

        .sidebar li.active {
            background: rgba(0, 212, 255, 0.2);
            border-left-color: #00d4ff;
            font-weight: bold;
        }

        /* 区域颜色标识 */
        .area-tag {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
        }

        /* 标题样式 */
        .header {
            position: fixed;
            top: 20px;
            left: 260px;
            z-index: 1001;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        /* 控制面板 */
        .controls {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1001;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .controls button {
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 8px;
            color: #1a1a2e;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .controls button:hover {
            background: #fff;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .zoom-controls {
            display: flex;
            gap: 5px;
        }

        .zoom-controls button {
            width: 45px;
            height: 45px;
            padding: 0;
            font-size: 20px;
            font-weight: bold;
        }

        /* 夜景模式按钮 */
        .night-mode-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1001;
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 20px;
            color: #1a1a2e;
            cursor: pointer;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
        }

        .night-mode-btn:hover {
            background: #fff;
            transform: translateY(-2px);
        }

        .night-mode-btn.active {
            background: #1a1a2e;
            color: #fff;
        }

        /* 信息面板 */
        .info-panel {
            position: fixed;
            top: 50%;
            right: 30px;
            transform: translateY(-50%);
            width: 350px;
            max-height: 70vh;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 16px;
            padding: 25px;
            z-index: 1002;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            overflow-y: auto;
        }

        .info-panel.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(-50%) translateX(100px);
        }

        .info-panel .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 30px;
            height: 30px;
            border: none;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            line-height: 1;
            transition: all 0.3s;
        }

        .info-panel .close-btn:hover {
            background: rgba(0, 0, 0, 0.2);
            transform: rotate(90deg);
        }

        .info-panel h2 {
            color: #1a1a2e;
            font-size: 22px;
            margin-bottom: 15px;
            padding-right: 30px;
        }

        .info-panel .icon {
            font-size: 48px;
            text-align: center;
            margin-bottom: 15px;
        }

        .info-panel .tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin-bottom: 10px;
            color: white;
        }

        .info-panel p {
            margin-bottom: 10px;
            color: #555;
            line-height: 1.6;
        }

        .info-panel h3 {
            color: #1a1a2e;
            font-size: 16px;
            margin-top: 15px;
            margin-bottom: 8px;
            padding-bottom: 5px;
            border-bottom: 2px solid #00d4ff;
        }

        .info-panel ul {
            margin-bottom: 10px;
            color: #555;
            padding-left: 20px;
        }

        .info-panel li {
            margin-bottom: 5px;
        }

        /* 加载画面 */
        .loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 26, 46, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: opacity 0.5s;
        }

        .loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading p {
            color: #fff;
            margin-top: 20px;
            font-size: 16px;
        }

        /* 提示信息 */
        #api-key-notice {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 193, 7, 0.95);
            color: #333;
            padding: 15px 25px;
            border-radius: 8px;
            z-index: 2001;
            display: none;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar {
                width: 180px;
                top: 80px;
                left: 10px;
            }
            
            .header {
                left: 200px;
            }
            
            .header h1 {
                font-size: 18px;
            }
            
            .info-panel {
                width: 90%;
                right: 5%;
                left: 5%;
                transform: translateY(0);
                top: auto;
                bottom: 100px;
                max-height: 50vh;
            }
            
            .info-panel.hidden {
                transform: translateY(100px);
            }
        }
    </style>
  <script type="module" crossorigin src="./assets/areas-Bb0hxwq-.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/main-DD3Ksoh5.js">
  <link rel="stylesheet" crossorigin href="./assets/main-Dr0N0u5w.css">
</head>
<body>
    <!-- 高德地图容器 -->
    <div id="amap-container"></div>

    <!-- UI覆盖层 -->
    <div id="overlay">
        <!-- 加载画面 -->
        <div id="loading" class="loading">
            <div class="loading-spinner"></div>
            <p>正在加载上海区域地图...</p>
        </div>

        <!-- 标题 -->
        <div class="header">
            <h1>🏙️ 上海3D区域地图</h1>
            <p>点击区域查看著名地点</p>
        </div>

        <!-- 夜景模式按钮 -->
        <button id="night-mode" class="night-mode-btn">🌙 夜景模式</button>

        <!-- 控制面板 -->
        <div class="controls">
            <button id="reset-view">🔄 重置视角</button>
            <button id="toggle-rotate">🔄 自动旋转</button>
            <div class="zoom-controls">
                <button id="zoom-in">+</button>
                <button id="zoom-out">-</button>
            </div>
        </div>

        <!-- 区域导航侧边栏 -->
        <div class="sidebar" style="pointer-events: auto !important;">
            <h3>🎯 特色区域 (12个)</h3>
            <ul id="area-list" style="pointer-events: auto !important;">
                <li data-area="nanjing-road-area" onclick="alert('点击了南京路商圈')" style="pointer-events: auto !important; cursor: pointer !important;"><span class="area-tag" style="background: #ff6b6b;"></span>南京路商圈</li>
                <li data-area="huaihai-road-area" onclick="alert('点击了淮海路商圈')" style="pointer-events: auto !important; cursor: pointer !important;"><span class="area-tag" style="background: #4ecdc4;"></span>淮海路商圈</li>
                <li data-area="the-bund-area" onclick="alert('点击了外滩')" style="pointer-events: auto !important; cursor: pointer !important;"><span class="area-tag" style="background: #ffd93d;"></span>外滩历史文化区</li>
                <li data-area="yuyuan-area" style="pointer-events: auto !important; cursor: pointer !important;"><span class="area-tag" style="background: #95e1d3;"></span>豫园老城厢</li>
                <li data-area="xintiandi-area" style="pointer-events: auto !important; cursor: pointer !important;"><span class="area-tag" style="background: #f38181;"></span>新天地石库门区</li>
                <li data-area="tianzifang-area" style="pointer-events: auto !important; cursor: pointer !important;"><span class="area-tag" style="background: #aa96da;"></span>田子坊创意区</li>
                <li data-area="wukang-road-area" style="pointer-events: auto !important; cursor: pointer !important;"><span class="area-tag" style="background: #fcbad3;"></span>武康路名人故居区</li>
                <li data-area="sinan-road-area" style="pointer-events: auto !important; cursor: pointer !important;"><span class="area-tag" style="background: #a8d8ea;"></span>思南路梧桐区</li>
                <li data-area="shaanxi-south-road" style="pointer-events: auto !important; cursor: pointer !important;"><span class="area-tag" style="background: #ff9f43;"></span>陕西南路商圈</li>
                <li data-area="chongqing-north-road" style="pointer-events: auto !important; cursor: pointer !important;"><span class="area-tag" style="background: #10ac84;"></span>重庆北路商务区</li>
                <li data-area="jingan-temple-area" style="pointer-events: auto !important; cursor: pointer !important;"><span class="area-tag" style="background: #ee5a6f;"></span>静安寺商圈</li>
                <li data-area="lujiazui-area" style="pointer-events: auto !important; cursor: pointer !important;"><span class="area-tag" style="background: #00d4ff;"></span>陆家嘴金融区</li>
            </ul>
            <p style="font-size: 11px; color: #888; margin-top: 10px; text-align: center;">
                💡 点击区域查看详情<br>
                点击地图上的蓝色标记
            </p>
        </div>

        <!-- 信息面板 -->
        <div id="info-panel" class="info-panel hidden">
            <button class="close-btn" id="close-info">×</button>
            <h2 id="info-title">标题</h2>
            <div id="info-content">内容</div>
        </div>

        <!-- API Key提示 -->
        <div id="api-key-notice">
            ⚠️ 请在代码中配置您的高德地图API Key
        </div>
    </div>

    <!-- 高德地图API -->
    <script src="https://webapi.amap.com/maps?v=2.0&key=6fc614d0454e138a426ed6735b5989c8&plugin=AMap.Buildings,AMap.Scale,AMap.ToolBar,AMap.Circle,AMap.GeometryUtil"></script>

    <!-- 主程序 -->
    <script type="module" src="./assets/areas-Bb0hxwq-.js"></script>
    
    <!-- 调试脚本：确保点击事件绑定 -->
    <script>
        window.addEventListener('load', function() {
            console.log('页面加载完成');
            
            // 直接绑定区域列表点击
            const areaList = document.getElementById('area-list');
            if (areaList) {
                console.log('找到area-list');
                areaList.addEventListener('click', function(e) {
                    console.log('area-list被点击', e.target);
                    const li = e.target.closest('li');
                    if (li) {
                        const areaId = li.getAttribute('data-area');
                        console.log('点击了区域:', areaId);
                        alert('点击了区域: ' + areaId);
                    }
                });
            }
            
            // 测试按钮点击
            const resetBtn = document.getElementById('reset-view');
            if (resetBtn) {
                resetBtn.addEventListener('click', function() {
                    console.log('重置按钮被点击');
                    alert('重置按钮工作正常');
                });
            }
        });
    </script>

</body>
</html>
