<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上海区域地图 - 简化版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            overflow: hidden;
            background: #1a1a2e;
        }
        
        /* 模拟地图背景 */
        #map-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            z-index: 1;
        }
        
        #map-bg::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 80%;
            background: rgba(0, 212, 255, 0.05);
            border-radius: 50%;
        }
        
        /* 标题 */
        .header {
            position: fixed;
            top: 20px;
            left: 260px;
            z-index: 100;
            color: #fff;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }
        
        .header h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.8;
        }
        
        /* 侧边栏 */
        .sidebar {
            position: fixed;
            top: 100px;
            left: 20px;
            width: 220px;
            max-height: calc(100vh - 140px);
            background: rgba(255, 255, 255, 0.95);
            border-radius: 12px;
            padding: 15px;
            z-index: 100;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        
        .sidebar h3 {
            color: #1a1a2e;
            font-size: 14px;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 2px solid #00d4ff;
        }
        
        .sidebar ul {
            list-style: none;
            margin-bottom: 20px;
        }
        
        .sidebar li {
            color: #333;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            border-left: 4px solid transparent;
            background: rgba(0, 0, 0, 0.05);
        }
        
        .sidebar li:hover {
            background: rgba(0, 212, 255, 0.15);
            transform: translateX(5px);
            border-left-color: #00d4ff;
        }
        
        .area-tag {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        
        /* 信息面板 */
        .info-panel {
            position: fixed;
            top: 50%;
            right: 30px;
            transform: translateY(-50%);
            width: 350px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 16px;
            padding: 25px;
            z-index: 100;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: none;
        }
        
        .info-panel.active {
            display: block;
        }
        
        .info-panel h2 {
            color: #1a1a2e;
            font-size: 22px;
            margin-bottom: 15px;
        }
        
        .info-panel .tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: white;
            margin-bottom: 10px;
        }
        
        .info-panel p {
            color: #555;
            line-height: 1.6;
            margin-bottom: 10px;
        }
        
        .info-panel h4 {
            color: #1a1a2e;
            font-size: 14px;
            margin: 15px 0 8px;
            padding-bottom: 5px;
            border-bottom: 2px solid #00d4ff;
        }
        
        .info-panel ul {
            color: #555;
            padding-left: 20px;
        }
        
        .info-panel li {
            margin-bottom: 5px;
        }
        
        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 30px;
            height: 30px;
            border: none;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.3s;
        }
        
        .close-btn:hover {
            background: rgba(0, 0, 0, 0.2);
            transform: rotate(90deg);
        }
        
        /* 控制按钮 */
        .controls {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .controls button {
            padding: 12px 20px;
            background: rgba(255, 255, 255, 0.9);
            border: none;
            border-radius: 8px;
            color: #1a1a2e;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        
        .controls button:hover {
            background: #fff;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <!-- 模拟地图背景 -->
    <div id="map-bg"></div>
    
    <!-- 标题 -->
    <div class="header">
        <h1>🏙️ 上海区域地图</h1>
        <p>点击区域查看详情（简化版）</p>
    </div>
    
    <!-- 侧边栏 -->
    <div class="sidebar">
        <h3>🎯 特色区域 (12个)</h3>
        <ul id="area-list">
            <li data-area="nanjing-road-area" style="border-left-color: #ff6b6b;">
                <span class="area-tag" style="background: #ff6b6b;"></span>南京路商圈
            </li>
            <li data-area="huaihai-road-area" style="border-left-color: #4ecdc4;">
                <span class="area-tag" style="background: #4ecdc4;"></span>淮海路商圈
            </li>
            <li data-area="the-bund-area" style="border-left-color: #ffd93d;">
                <span class="area-tag" style="background: #ffd93d;"></span>外滩历史文化区
            </li>
            <li data-area="yuyuan-area" style="border-left-color: #95e1d3;">
                <span class="area-tag" style="background: #95e1d3;"></span>豫园老城厢
            </li>
            <li data-area="xintiandi-area" style="border-left-color: #f38181;">
                <span class="area-tag" style="background: #f38181;"></span>新天地石库门区
            </li>
            <li data-area="tianzifang-area" style="border-left-color: #aa96da;">
                <span class="area-tag" style="background: #aa96da;"></span>田子坊创意区
            </li>
            <li data-area="wukang-road-area" style="border-left-color: #fcbad3;">
                <span class="area-tag" style="background: #fcbad3;"></span>武康路名人故居区
            </li>
            <li data-area="sinan-road-area" style="border-left-color: #a8d8ea;">
                <span class="area-tag" style="background: #a8d8ea;"></span>思南路梧桐区
            </li>
            <li data-area="shaanxi-south-road" style="border-left-color: #ff9f43;">
                <span class="area-tag" style="background: #ff9f43;"></span>陕西南路商圈
            </li>
            <li data-area="chongqing-north-road" style="border-left-color: #10ac84;">
                <span class="area-tag" style="background: #10ac84;"></span>重庆北路商务区
            </li>
            <li data-area="jingan-temple-area" style="border-left-color: #ee5a6f;">
                <span class="area-tag" style="background: #ee5a6f;"></span>静安寺商圈
            </li>
            <li data-area="lujiazui-area" style="border-left-color: #00d4ff;">
                <span class="area-tag" style="background: #00d4ff;"></span>陆家嘴金融区
            </li>
        </ul>
        <p style="font-size: 11px; color: #888; text-align: center;">
            💡 点击区域查看详情
        </p>
    </div>
    
    <!-- 信息面板 -->
    <div id="info-panel" class="info-panel">
        <button class="close-btn" onclick="closePanel()">×</button>
        <h2 id="info-title">标题</h2>
        <span id="info-tag" class="tag">标签</span>
        <p id="info-desc">描述</p>
        <h4>包含街道</h4>
        <p id="info-streets"></p>
        <h4>📍 著名地点</h4>
        <ul id="info-points"></ul>
    </div>
    
    <!-- 控制按钮 -->
    <div class="controls">
        <button onclick="resetView()">🔄 重置视角</button>
    </div>
    
    <script>
        // 区域数据
        const areasData = [
            {
                id: 'nanjing-road-area',
                name: '南京路商圈',
                color: '#ff6b6b',
                description: '上海最繁华的商业中心，中华商业第一街所在地',
                streets: ['南京路步行街', '南京西路', '南京东路'],
                points: ['第一百货', '新世界城', '永安百货', '老凤祥银楼', '和平饭店']
            },
            {
                id: 'huaihai-road-area',
                name: '淮海路商圈',
                color: '#4ecdc4',
                description: '东方巴黎，上海最具时尚气息的商业街',
                streets: ['淮海中路', '淮海西路', '淮海东路'],
                points: ['环贸iapm', '国泰电影院', '思南公馆']
            },
            {
                id: 'the-bund-area',
                name: '外滩历史文化区',
                color: '#ffd93d',
                description: '万国建筑博览群，上海的城市名片',
                streets: ['中山东一路', '中山东二路'],
                points: ['海关大楼', '和平饭店', '汇丰银行大楼']
            },
            {
                id: 'yuyuan-area',
                name: '豫园老城厢',
                color: '#95e1d3',
                description: '上海老城厢，明清古建筑群',
                streets: ['豫园老街', '方浜中路'],
                points: ['豫园', '城隍庙', '九曲桥', '南翔馒头店']
            },
            {
                id: 'xintiandi-area',
                name: '新天地石库门区',
                color: '#f38181',
                description: '石库门里的时尚地标，传统与现代融合',
                streets: ['太仓路', '兴业路'],
                points: ['中共一大会址', '新天地北里', '新天地南里']
            },
            {
                id: 'tianzifang-area',
                name: '田子坊创意区',
                color: '#aa96da',
                description: '上海创意产业发源地，弄堂里的艺术天地',
                streets: ['泰康路', '建国中路'],
                points: ['陈逸飞工作室', '尔冬强艺术中心']
            },
            {
                id: 'wukang-road-area',
                name: '武康路名人故居区',
                color: '#fcbad3',
                description: '浓缩上海近代史的名人街',
                streets: ['武康路', '湖南路'],
                points: ['武康大楼', '巴金故居', '宋庆龄故居']
            },
            {
                id: 'sinan-road-area',
                name: '思南路梧桐区',
                color: '#a8d8ea',
                description: '上海最浪漫的马路，法国梧桐蔽日',
                streets: ['思南路', '皋兰路'],
                points: ['周公馆', '孙中山故居', '梅兰芳故居']
            },
            {
                id: 'shaanxi-south-road',
                name: '陕西南路商圈',
                color: '#ff9f43',
                description: '连接淮海路与南京路的黄金走廊',
                streets: ['陕西南路', '进贤路'],
                points: ['百盛购物中心', '巴黎春天', '襄阳路市场']
            },
            {
                id: 'chongqing-north-road',
                name: '重庆北路商务区',
                color: '#10ac84',
                description: '人民广场北侧商务中心',
                streets: ['重庆北路', '威海路'],
                points: ['人民广场', '上海博物馆', '上海大剧院']
            },
            {
                id: 'jingan-temple-area',
                name: '静安寺商圈',
                color: '#ee5a6f',
                description: '千年古刹静安寺周边，高端商务区',
                streets: ['南京西路', '华山路'],
                points: ['静安寺', '恒隆广场', '梅龙镇广场']
            },
            {
                id: 'lujiazui-area',
                name: '陆家嘴金融区',
                color: '#00d4ff',
                description: '中国金融中心，摩天大楼林立',
                streets: ['世纪大道', '陆家嘴环路'],
                points: ['东方明珠', '上海中心大厦', '金茂大厦']
            }
        ];
        
        // 绑定点击事件
        document.getElementById('area-list').addEventListener('click', function(e) {
            const li = e.target.closest('li');
            if (!li) return;
            
            const areaId = li.getAttribute('data-area');
            const area = areasData.find(a => a.id === areaId);
            
            if (area) {
                showAreaInfo(area);
            }
        });
        
        function showAreaInfo(area) {
            document.getElementById('info-title').textContent = area.name;
            document.getElementById('info-tag').textContent = '特色区域';
            document.getElementById('info-tag').style.background = area.color;
            document.getElementById('info-desc').textContent = area.description;
            document.getElementById('info-streets').textContent = area.streets.join('、');
            
            const pointsList = document.getElementById('info-points');
            pointsList.innerHTML = '';
            area.points.forEach(point => {
                const li = document.createElement('li');
                li.textContent = point;
                pointsList.appendChild(li);
            });
            
            document.getElementById('info-panel').classList.add('active');
        }
        
        function closePanel() {
            document.getElementById('info-panel').classList.remove('active');
        }
        
        function resetView() {
            closePanel();
        }
        
        console.log('简化版区域地图加载完成');
    </script>
</body>
</html>
